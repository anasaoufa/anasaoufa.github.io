<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GymTrack">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="manifest" href="/manifest.json">
  <title>GymTrack</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<!-- Onboarding (first run) -->
<div id="onboarding" class="hidden">
  <h1>GymTrack</h1>
  <p class="onboard-sub">Set up your profile to get started</p>
  <form id="onboard-form">
    <div id="onboard-fields"></div>
    <button type="submit" class="btn-primary btn-full" style="margin-top:16px">Get Started</button>
  </form>
</div>

<!-- Install banner (iOS) -->
<div id="install-banner" class="hidden">
  <span>Tap <strong>Share</strong> then <strong>Add to Home Screen</strong> to install</span>
  <button id="install-dismiss" class="btn-icon">✕</button>
</div>

<!-- Main app -->
<div id="app" class="hidden">
  <div id="tab-content">
    <section id="tab-dashboard" class="tab-section"></section>
    <section id="tab-workout"   class="tab-section hidden"></section>
    <section id="tab-calories"  class="tab-section hidden"></section>
    <section id="tab-profile"   class="tab-section hidden"></section>
  </div>

  <nav id="tab-bar">
    <button class="tab-btn active" data-tab="dashboard">
      <svg viewBox="0 0 24 24"><path d="M3 13h1v7c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-4h4v4c0 .55.45 1 1 1h4c.55 0 1-.45 1-1v-7h1c.45 0 .68-.54.35-.85l-9-8.5a.495.495 0 0 0-.7 0l-9 8.5c-.32.31-.1.85.35.85z"/></svg>
      <span>Home</span>
    </button>
    <button class="tab-btn" data-tab="workout">
      <svg viewBox="0 0 24 24"><path d="M20.57 14.86L22 13.43 20.57 12 17 15.57 8.43 7 12 3.43 10.57 2 9.14 3.43 7.71 2 5.57 4.14 4.14 2.71 2.71 4.14l1.43 1.43L2 7.71l1.43 1.43L2 10.57 3.43 12 7 8.43 15.57 17 12 20.57 13.43 22l1.43-1.43L16.29 22l2.14-2.14 1.43 1.43 1.43-1.43-1.43-1.43L22 16.29z"/></svg>
      <span>Workout</span>
    </button>
    <button class="tab-btn" data-tab="calories">
      <svg viewBox="0 0 24 24"><path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/></svg>
      <span>Calories</span>
    </button>
    <button class="tab-btn" data-tab="profile">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <span>Profile</span>
    </button>
  </nav>
</div>

<!-- Modal -->
<div id="modal-overlay" class="hidden">
  <div id="modal-content"></div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script src="/js/storage.js"></script>
<script src="/js/tdee.js"></script>
<script src="/js/health.js"></script>
<script src="/js/workouts.js"></script>
<script src="/js/calories.js"></script>
<script src="/js/dashboard.js"></script>
<script src="/js/ui.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
